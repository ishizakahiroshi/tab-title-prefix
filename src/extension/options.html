<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Tab Title Prefix</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 16px; max-width: 480px; }
  label { display: block; margin-bottom: 12px; }
  input[type="text"] { width: 100%; box-sizing: border-box; margin-top: 4px; }
  .hint { color: #666; font-size: 0.85em; margin-top: 4px; }
  #status { margin-top: 12px; color: #2a7; min-height: 1.2em; }
</style>
</head>
<body>
  <h1 data-i18n="optionsTitle"></h1>
  <label>
    <input type="checkbox" id="enabled">
    <span data-i18n="optionsEnabledLabel"></span>
  </label>
  <label>
    <span data-i18n="optionsFormatLabel"></span>
    <input type="text" id="format">
    <div class="hint" data-i18n="optionsFormatHint"></div>
  </label>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
